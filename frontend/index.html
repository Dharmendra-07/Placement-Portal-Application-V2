<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d6efd" />
  <meta name="description" content="Campus Placement Portal — manage drives, applications and placements." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="PPA" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <title>Placement Portal</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <style>
    /* ── Base ── */
    :root {
      --ppa-primary:       #0d6efd;
      --ppa-primary-dark:  #0a58ca;
      --ppa-sidebar-w:     220px;
      --ppa-nav-h:         56px;
      --ppa-radius:        10px;
      --ppa-shadow:        0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --ppa-shadow-md:     0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -1px rgba(0,0,0,.06);
    }

    html { scroll-behavior: smooth; }

    body {
      background: #f8f9fc;
      font-size: 0.9375rem;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Cards ── */
    .card {
      border-radius: var(--ppa-radius) !important;
      box-shadow: var(--ppa-shadow) !important;
    }
    .card-header {
      border-radius: var(--ppa-radius) var(--ppa-radius) 0 0 !important;
      border-bottom: 1px solid rgba(0,0,0,.06) !important;
      font-weight: 500;
    }

    /* ── Buttons ── */
    .btn { border-radius: 8px !important; font-weight: 500; }
    .btn-primary { background: var(--ppa-primary); border-color: var(--ppa-primary); }
    .btn-primary:hover { background: var(--ppa-primary-dark); }

    /* ── Forms ── */
    .form-control, .form-select {
      border-radius: 8px !important;
      border-color: #dee2e6;
      font-size: 0.9rem;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--ppa-primary);
      box-shadow: 0 0 0 0.2rem rgba(13,110,253,.15);
    }
    .form-label { font-size: 0.85rem; font-weight: 500; color: #495057; margin-bottom: 4px; }

    /* Invalid field highlight */
    .form-control.is-invalid, .form-select.is-invalid {
      border-color: #dc3545;
      background-image: none;
    }
    .invalid-feedback { font-size: 0.8rem; }

    /* ── Navbar ── */
    .navbar { height: var(--ppa-nav-h); box-shadow: var(--ppa-shadow-md); z-index: 1030; }
    .navbar-brand { font-weight: 700; font-size: 1.1rem; letter-spacing: -.3px; }
    .navbar .nav-link { font-size: 0.875rem; padding: .4rem .75rem !important; border-radius: 6px; }
    .navbar .nav-link:hover, .navbar .nav-link.router-link-active {
      background: rgba(255,255,255,.15);
    }

    /* ── Tables ── */
    .table { font-size: 0.875rem; }
    .table thead th { font-weight: 600; font-size: 0.8rem; text-transform: uppercase;
                      letter-spacing: .04em; color: #6c757d; }
    .table-hover tbody tr:hover { background: rgba(13,110,253,.03); }

    /* ── Badges ── */
    .badge { font-weight: 500; letter-spacing: .02em; padding: .35em .65em; }

    /* ── Stat cards ── */
    .stat-card { transition: transform .15s, box-shadow .15s; cursor: default; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--ppa-shadow-md) !important; }

    /* ── Mobile bottom nav ── */
    .mobile-bottom-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: #fff;
      border-top: 1px solid rgba(0,0,0,.08);
      z-index: 1020;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .mobile-bottom-nav a {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px; font-size: .7rem; color: #6c757d;
      text-decoration: none; padding: 6px 0;
    }
    .mobile-bottom-nav a.router-link-active { color: var(--ppa-primary); }
    .mobile-bottom-nav a i { font-size: 1.2rem; }

    @media (max-width: 768px) {
      .mobile-bottom-nav { display: flex; }
      .page-content { padding-bottom: 72px !important; }
      .navbar .navbar-nav { display: none !important; }
    }

    /* ── Page transitions ── */
    .fade-enter-active, .fade-leave-active { transition: opacity .18s ease; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }

    /* ── Skeleton loading ── */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── PWA install banner ── */
    #pwa-banner {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid rgba(0,0,0,.1);
      padding: 12px 16px; display: none; align-items: center;
      gap: 12px; z-index: 2000; box-shadow: 0 -4px 12px rgba(0,0,0,.08);
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
    }
    #pwa-banner.visible { display: flex; }
    #pwa-banner p { margin: 0; flex: 1; font-size: .875rem; }
    #pwa-banner .btn { white-space: nowrap; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c1c7d0; border-radius: 3px; }

    /* ── Print ── */
    @media print {
      .navbar, .mobile-bottom-nav, #pwa-banner { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- PWA install banner -->
  <div id="pwa-banner">
    <i class="bi bi-phone fs-4 text-primary"></i>
    <p><strong>Add to Home Screen</strong><br>
       <small class="text-muted">Install Placement Portal for quick access.</small></p>
    <button class="btn btn-primary btn-sm" id="pwa-install-btn">Install</button>
    <button class="btn btn-outline-secondary btn-sm" id="pwa-dismiss-btn">Later</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- PWA: register service worker + handle install prompt -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    let _deferredPrompt = null;
    const banner      = document.getElementById('pwa-banner');
    const installBtn  = document.getElementById('pwa-install-btn');
    const dismissBtn  = document.getElementById('pwa-dismiss-btn');

    // Show banner when browser fires beforeinstallprompt
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      _deferredPrompt = e;
      if (!localStorage.getItem('pwa-dismissed')) {
        banner.classList.add('visible');
      }
    });

    installBtn.addEventListener('click', async () => {
      if (!_deferredPrompt) return;
      _deferredPrompt.prompt();
      const { outcome } = await _deferredPrompt.userChoice;
      _deferredPrompt = null;
      banner.classList.remove('visible');
      if (outcome === 'accepted') localStorage.setItem('pwa-installed', '1');
    });

    dismissBtn.addEventListener('click', () => {
      banner.classList.remove('visible');
      localStorage.setItem('pwa-dismissed', '1');
    });

    window.addEventListener('appinstalled', () => {
      banner.classList.remove('visible');
    });
  </script>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
